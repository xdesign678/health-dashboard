<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康追踪 | Health Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF4D00">
    <style>
        :root {
            --primary: #FF4D00;
            --secondary: #FFB800;
            --bg-dark: #0A0A0A;
            --bg-card: #1A1A1A;
            --text-primary: #FFFFFF;
            --text-secondary: #999999;
            --success: #00FF88;
            --warning: #FF4D00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        /* 动态网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 77, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 77, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 顶部标题 */
        .header {
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header .date {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* 主网格布局 - 非对称 */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        /* 大数字卡片 */
        .hero-stat {
            grid-column: span 6;
            background: var(--bg-card);
            border: 1px solid rgba(255, 77, 0, 0.2);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .hero-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .hero-stat .label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .hero-stat .value {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .hero-stat .unit {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 小卡片 */
        .stat-card {
            grid-column: span 3;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(255, 77, 0, 0.3);
            transform: translateY(-2px);
        }

        .stat-card .icon {
            font-size: 2rem;
            margin-bottom: 15px;
            display: block;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
            color: var(--text-primary);
        }

        /* 进度区域 */
        .progress-section {
            grid-column: span 12;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }

        .progress-section-inner {
            grid-column: 1 / -1;
        }

        .progress-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-item {
            margin-bottom: 30px;
        }

        .progress-item:last-child {
            margin-bottom: 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 缺口指示器 */
        .deficit-indicator {
            grid-column: span 12;
            background: var(--bg-card);
            border: 2px solid var(--primary);
            padding: 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .deficit-indicator::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 77, 0, 0.1), transparent);
        }

        .deficit-indicator .big-number {
            font-size: clamp(4rem, 8vw, 7rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            position: relative;
            z-index: 1;
        }

        .deficit-indicator .status {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            z-index: 1;
        }

        /* 记录列表 */
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .record-section {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
        }

        .record-section h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .record-item {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--primary);
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .record-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--secondary);
            transform: translateX(5px);
        }

        .record-item .time {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .record-item .content {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .record-item .calories {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .hero-stat, .stat-card, .progress-section, .deficit-indicator {
                grid-column: span 12;
            }

            .records-grid {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 2.5rem;
            }

            .hero-stat, .record-section {
                padding: 25px;
            }
        }

        /* 加载动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                scroll-behavior: auto !important;
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        .main-grid > *, .records-grid > * {
            will-change: transform, opacity;
            animation: fadeIn 0.6s ease-out backwards;
        }

        .main-grid > *:nth-child(1) { animation-delay: 0.1s; }
        .main-grid > *:nth-child(2) { animation-delay: 0.2s; }
        .main-grid > *:nth-child(3) { animation-delay: 0.3s; }
        .main-grid > *:nth-child(4) { animation-delay: 0.4s; }
        .main-grid > *:nth-child(5) { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>健康追踪</h1>
            <div class="date" id="current-date">加载中...</div>
        </div>

        <div class="main-grid">
            <!-- 大数字：摄入 -->
            <div class="hero-stat">
                <div class="label">今日摄入</div>
                <div class="value" id="total-intake">0</div>
                <div class="unit">千卡</div>
            </div>

            <!-- 大数字：缺口 -->
            <div class="hero-stat">
                <div class="label">热量缺口</div>
                <div class="value" id="deficit">0</div>
                <div class="unit">千卡</div>
            </div>

            <!-- 小卡片：消耗 -->
            <div class="stat-card">
                <span class="icon">🔥</span>
                <div class="label">已消耗</div>
                <div class="value" id="total-burn">0</div>
            </div>

            <!-- 小卡片：目标 -->
            <div class="stat-card">
                <span class="icon">🎯</span>
                <div class="label">目标</div>
                <div class="value">-1560</div>
            </div>

            <!-- 进度条 + BMR & 用水 -->
            <div class="progress-section">
                <div class="progress-section-inner">
                    <h2>今日进度</h2>
                </div>
                <div class="progress-item">
                    <div class="progress-header">
                        <span class="progress-label">摄入进度（目标：1,500 千卡）</span>
                        <span class="progress-value" id="intake-percent">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="intake-progress" style="width: 0%"></div>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="progress-header">
                        <span class="progress-label">消耗进度（目标：3,060 千卡）</span>
                        <span class="progress-value" id="burn-percent">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="burn-progress" style="width: 0%"></div>
                    </div>
                </div>
                <div class="progress-item" id="bmr-card">
                    <div class="progress-header">
                        <span class="progress-label">基础代谢 (BMR)</span>
                        <span class="progress-value" id="bmr-value">-</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="bmr-progress" style="width: 0%"></div>
                    </div>
                </div>
                <div class="progress-item" id="water-card">
                    <div class="progress-header">
                        <span class="progress-label">今日饮水</span>
                        <span class="progress-value" id="water-value">0 / 2000 ml</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="water-progress" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- 缺口状态 -->
            <div class="deficit-indicator" id="deficit-indicator">
                <div class="label">当前缺口</div>
                <div class="big-number" id="deficit-big">0</div>
                <div class="status" id="deficit-status">加载中...</div>
            </div>
        </div>

        <!-- 记录列表 + 时间轴 + 睡眠 -->
        <div class="records-grid">
            <div class="record-section">
                <h2>🍽️ 今日饮食</h2>
                <div id="meals-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="record-section">
                <h2>🏃 今日运动</h2>
                <div id="exercises-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="record-section">
                <h2>⏱️ 饮食时间轴</h2>
                <div id="timeline-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="record-section">
                <h2>🌙 睡眠质量</h2>
                <div id="sleep-card">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        const GITHUB_USER = 'xdesign678';
        const REPO_NAME = 'health-dashboard';
        const DATA_BASE_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/daily/`;

        const today = new Date();
        const dateStr = today.toLocaleDateString('zh-CN', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            weekday: 'long'
        });
        document.getElementById('current-date').textContent = dateStr;

        // 数字滚动动画
        function animateNumber(element, target, duration = 1000) {
            const start = parseInt(element.textContent) || 0;
            const increment = (target - start) / (duration / 16);
            let current = start;

            const timer = setInterval(() => {
                current += increment;
                if ((increment > 0 && current >= target) || (increment < 0 && current <= target)) {
                    element.textContent = Math.round(target).toLocaleString();
                    clearInterval(timer);
                } else {
                    element.textContent = Math.round(current).toLocaleString();
                }
            }, 16);
        }

        const STORAGE_KEY = 'health-dashboard-cache-v1';

        function saveCache(data) {
            try {
                const payload = {
                    ts: Date.now(),
                    data
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            } catch (e) {}
        }

        function loadCache() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const payload = JSON.parse(raw);
                const maxAge = 1000 * 60 * 10;
                if (Date.now() - payload.ts > maxAge) return null;
                return payload.data;
            } catch (e) {
                return null;
            }
        }

        async function loadData(showSkeleton = true) {
            const cached = loadCache();
            if (cached) {
                updateStats(cached);
                updateMeals(cached.meals);
                updateExercises(cached.exercises);
                updateTimeline(cached.meals);
                updateSleep(cached.sleep || null);
            } else if (showSkeleton) {
                setSkeletonState(true);
            }

            try {
                const dateKey = today.toISOString().split('T')[0];
                const dataUrl = `${DATA_BASE_URL}${dateKey}.json`;
                const response = await fetch(dataUrl);
                if (!response.ok) throw new Error('Data not found');
                const data = await response.json();
                saveCache(data);
                setSkeletonState(false);
                updateStats(data);
                updateMeals(data.meals);
                updateExercises(data.exercises);
                updateTimeline(data.meals);
                updateSleep(data.sleep || null);
            } catch (error) {
                console.error('Failed to load data:', error);
                setErrorState();
            }
        }

        function calculateBMR(profile) {
            if (!profile) return 0;
            const { gender, weightKg, heightCm, age } = profile;
            if (!weightKg || !heightCm || !age) return 0;
            if (gender === 'female') {
                return 447.593 + 9.247 * weightKg + 3.098 * heightCm - 4.33 * age;
            }
            return 88.362 + 13.397 * weightKg + 4.799 * heightCm - 5.677 * age;
        }

        function updateStats(data) {
            const totalIntake = data.summary.totalIntake;
            const totalBurn = data.summary.totalBurn + 2560;
            const deficit = totalBurn - totalIntake;

            animateNumber(document.getElementById('total-intake'), totalIntake);
            animateNumber(document.getElementById('total-burn'), totalBurn);
            animateNumber(document.getElementById('deficit'), deficit);
            animateNumber(document.getElementById('deficit-big'), deficit);

            const intakeProgress = Math.min((totalIntake / 1500) * 100, 100);
            const burnProgress = Math.min((totalBurn / 3060) * 100, 100);

            const bmr = calculateBMR(data.profile || null);
            const bmrEl = document.getElementById('bmr-value');
            if (bmr && bmrEl) {
                animateNumber(bmrEl, Math.round(bmr));
                const bmrProgressEl = document.getElementById('bmr-progress');
                if (bmrProgressEl) {
                    const pct = Math.min((bmr / 2500) * 100, 100);
                    requestAnimationFrame(() => {
                        bmrProgressEl.style.width = pct + '%';
                    });
                }
            } else if (bmrEl) {
                bmrEl.textContent = '-';
            }

            const waterTarget = (data.goals && data.goals.waterMl) || 2000;
            const water = (data.summary && data.summary.waterMl) || 0;
            const waterPct = Math.min((water / waterTarget) * 100, 100);
            const waterValueEl = document.getElementById('water-value');
            const waterProgressEl = document.getElementById('water-progress');
            if (waterValueEl && waterProgressEl) {
                waterValueEl.textContent = `${water} / ${waterTarget} ml`;
                requestAnimationFrame(() => {
                    waterProgressEl.style.width = waterPct + '%';
                });
            }

            setTimeout(() => {
                document.getElementById('intake-progress').style.width = intakeProgress + '%';
                document.getElementById('intake-percent').textContent = Math.round(intakeProgress) + '%';
                
                document.getElementById('burn-progress').style.width = burnProgress + '%';
                document.getElementById('burn-percent').textContent = Math.round(burnProgress) + '%';
            }, 500);

            const statusEl = document.getElementById('deficit-status');
            if (deficit >= 1560) {
                statusEl.textContent = '🎉 太棒了！已达成今日目标！';
            } else if (deficit >= 1000) {
                statusEl.textContent = '💪 很不错！继续保持！';
            } else {
                statusEl.textContent = `还需要 ${(1560 - deficit).toLocaleString()} 卡缺口`;
            }
        }

        function setSkeletonState(active) {
            const skeletonHtml = '<div class="empty-state">加载中...</div>';
            if (active) {
                document.getElementById('meals-list').innerHTML = skeletonHtml;
                document.getElementById('exercises-list').innerHTML = skeletonHtml;
            }
        }

        function setErrorState() {
            const errorHtml = '<div class="empty-state">数据加载失败，请稍后重试</div>';
            document.getElementById('meals-list').innerHTML = errorHtml;
            document.getElementById('exercises-list').innerHTML = errorHtml;
        }

        function updateMeals(meals) {
            const list = document.getElementById('meals-list');
            if (!meals || meals.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }

            list.innerHTML = meals.map(meal => {
                const time = new Date(meal.time).toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                return `
                    <div class="record-item">
                        <div class="time">${time} · ${meal.note}</div>
                        <div class="content">${meal.items.join('、')}</div>
                        <div class="calories">${meal.calories} 千卡</div>
                    </div>
                `;
            }).join('');
        }

        function updateExercises(exercises) {
            const list = document.getElementById('exercises-list');
            if (!exercises || exercises.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }

            list.innerHTML = exercises.map(exercise => {
                const time = new Date(exercise.time).toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                const intensity = exercise.intensity || '中等';
                const heartRate = exercise.heartRate ? `${exercise.heartRate} bpm` : '—';
                return `
                    <div class="record-item">
                        <div class="time">${time} · 强度：${intensity} · 心率：${heartRate}</div>
                        <div class="content">${exercise.type} · ${exercise.duration} 分钟</div>
                        <div class="calories">-${exercise.calories} 千卡</div>
                    </div>
                `;
            }).join('');
        }

        function updateTimeline(meals) {
            const list = document.getElementById('timeline-list');
            if (!meals || meals.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }

            const sorted = [...meals].sort((a, b) => new Date(a.time) - new Date(b.time));
            list.innerHTML = sorted.map(meal => {
                const time = new Date(meal.time).toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                return `
                    <div class="record-item">
                        <div class="time">${time}</div>
                        <div class="content">${meal.items.join('、')}</div>
                        <div class="calories">${meal.calories} 千卡</div>
                    </div>
                `;
            }).join('');
        }

        function updateSleep(sleep) {
            const card = document.getElementById('sleep-card');
            if (!sleep) {
                card.innerHTML = '<div class="empty-state">暂无睡眠数据</div>';
                return;
            }
            const quality = sleep.qualityLabel || '一般';
            const score = sleep.score || 0;
            const hours = sleep.durationHours || 0;
            const stages = sleep.deepHours && sleep.lightHours
                ? `深睡 ${sleep.deepHours}h · 浅睡 ${sleep.lightHours}h`
                : '';
            card.innerHTML = `
                <div class="record-item">
                    <div class="time">得分：${score} / 100 · 质量：${quality}</div>
                    <div class="content">时长：${hours} 小时 ${stages}</div>
                    <div class="calories">入睡 ${sleep.bedTime || '-'} · 起床 ${sleep.wakeTime || '-'}</div>
                </div>
            `;
        }

        loadData();
        setInterval(() => loadData(false), 30000);
    </script>
</body>
</html>
