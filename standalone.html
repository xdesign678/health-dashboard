<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管理大师 - 数据看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .stat-card .subtext {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .progress-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .progress-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .progress-bar {
            background: #f0f0f0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .meals-section, .exercises-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .meals-section h2, .exercises-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .meal-item, .exercise-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meal-item .time, .exercise-item .time {
            color: #999;
            font-size: 0.9em;
        }

        .meal-item .calories, .exercise-item .calories {
            font-weight: bold;
            color: #667eea;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        .deficit-indicator {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .deficit-indicator.positive {
            background: #d4edda;
            color: #155724;
        }

        .deficit-indicator.negative {
            background: #f8d7da;
            color: #721c24;
        }

        .deficit-indicator .big-number {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💪 健康管理大师</h1>
            <p>今日数据看板 - <span id="current-date"></span></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">🍽️</div>
                <div class="label">今日摄入</div>
                <div class="value" id="total-intake">850</div>
                <div class="subtext">卡路里</div>
            </div>

            <div class="stat-card">
                <div class="icon">🔥</div>
                <div class="label">今日消耗</div>
                <div class="value" id="total-burn">2,560</div>
                <div class="subtext">卡路里</div>
            </div>

            <div class="stat-card">
                <div class="icon">📊</div>
                <div class="label">热量缺口</div>
                <div class="value" id="deficit">1,710</div>
                <div class="subtext">卡路里</div>
            </div>

            <div class="stat-card">
                <div class="icon">🎯</div>
                <div class="label">目标缺口</div>
                <div class="value">-1,560</div>
                <div class="subtext">卡路里/天</div>
            </div>
        </div>

        <div class="progress-section">
            <h2>📈 今日进度</h2>
            <div>
                <p style="margin-bottom: 10px;">摄入进度（目标：1,500 卡）</p>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 57%">57%</div>
                </div>
            </div>
            <div>
                <p style="margin-bottom: 10px;">消耗进度（目标：3,060 卡）</p>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 84%">84%</div>
                </div>
            </div>
            <div class="deficit-indicator positive">
                <p>当前热量缺口</p>
                <div class="big-number">1,710</div>
                <p>💪 很不错！继续保持！</p>
            </div>
        </div>

        <div class="meals-section">
            <h2>🍽️ 今日饮食</h2>
            <div id="meals-list">
                <div class="meal-item">
                    <div>
                        <div><strong>手撕猪肉汉堡、半份薯条</strong></div>
                        <div class="time">12:00 - 午餐</div>
                    </div>
                    <div class="calories">850 卡</div>
                </div>
            </div>
        </div>

        <div class="exercises-section">
            <h2>🏃 今日运动</h2>
            <div id="exercises-list">
                <div class="empty-state">暂无记录</div>
            </div>
        </div>
    </div>

    <script>
        // 设置当前日期
        const today = new Date();
        const dateStr = today.toLocaleDateString('zh-CN', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            weekday: 'long'
        });
        document.getElementById('current-date').textContent = dateStr;
    </script>
</body>
</html>
